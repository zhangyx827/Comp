<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编译器可视化平台</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for("static", filename="css/style.css") }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">

</head>
<body>
    <div class="bg-animation"></div>

    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <span class="logo-text">Compiler Studio</span>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <div class="stat-value" id="stat-tokens">0</div>
                    <div class="stat-label">Tokens</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-ast-nodes">0</div>
                    <div class="stat-label">AST Nodes</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-symbols">0</div>
                    <div class="stat-label">Symbols</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-lines">0</div>
                    <div class="stat-label">ASM Lines</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-tac-lines">0</div>
                    <div class="stat-label">TAC Lines</div>
                </div>
            </div>
        </div>
    </header>

    <main class="container main-layout">
        <!-- Code Editor Panel -->
        <section class="editor-section fade-in">
            <div class="editor-header">
                <h2 class="editor-title">源代码编辑器</h2>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <select id="target-select" style="background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); padding: 0.75rem 1rem; border-radius: 8px; outline: none; font-family: inherit; font-size: 1rem;">
                        <option value="x86_64">x86-64</option>
                        <option value="riscv64">RISC-V 64</option>
                        <option value="aarch64">ARM64 / AArch64</option>
                    </select>
                    <select id="example-select" onchange="loadExample()" style="background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); padding: 0.75rem 1rem; border-radius: 8px; outline: none; font-family: inherit; font-size: 1rem;">
                        <option value="complex">示例: 结构体综合程序</option>
                        <option value="math">示例: 基础运算</option>
                        <option value="loop">示例: 循环结构</option>
                        <option value="func">示例: 函数调用</option>
                        <option value="fibonacci">示例: 递归斐波那契</option>
                        <option value="primes">示例: 寻找素数</option>
                        <option value="array">示例: 数组操作</option>
                        <option value="pointer">示例: 指针操作</option>
                    </select>
                    <button class="compile-btn" onclick="compileCode()">
                        🚀 编译代码
                    </button>
                </div>
            </div>
            <div class="editor-wrapper">
                <textarea 
                    class="code-editor" 
                    id="code-editor"
                    placeholder="在此输入代码..."
                    spellcheck="false"
                ></textarea>
            </div>
        </section>

        <!-- Errors and Warnings -->
        <section class="editor-section fade-in" id="errors-section" style="display: none;">
            <div class="editor-header">
                <h2 class="editor-title">错误与警告</h2>
            </div>
            <div class="stage-content" id="content-errors" style="padding: 1rem;">
            </div>
        </section>

        <!-- Pipeline Visualization -->
        <section class="pipeline-section">
            <!-- Lexical Analysis -->
            <div class="pipeline-stage" id="stage-lexer">
                <div class="stage-header">
                    <h3 class="stage-title">
                        <span class="stage-icon">🔤</span>
                        词法分析
                    </h3>
                    <div class="stage-status" id="status-lexer"></div>
                </div>
                <div class="stage-content" id="content-lexer">
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>词法分析结果将显示在这里</p>
                    </div>
                </div>
            </div>

            <!-- Syntax Analysis -->
            <div class="pipeline-stage" id="stage-parser">
                <div class="stage-header">
                    <h3 class="stage-title">
                        <span class="stage-icon">🌳</span>
                        语法分析
                    </h3>
                    <div class="stage-status" id="status-parser"></div>
                </div>
                <div class="stage-content" id="content-parser">
                    <div class="empty-state">
                        <div class="empty-state-icon">🌲</div>
                        <p>语法树将显示在这里</p>
                    </div>
                </div>
            </div>

            <!-- Semantic Analysis -->
            <div class="pipeline-stage" id="stage-semantic">
                <div class="stage-header">
                    <h3 class="stage-title">
                        <span class="stage-icon">🧠</span>
                        语义分析
                    </h3>
                    <div class="stage-status" id="status-semantic"></div>
                </div>
                <div class="stage-content" id="content-semantic">
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <p>符号表和语义检查结果</p>
                    </div>
                </div>
            </div>

            <!-- Code Generation -->
            <div class="pipeline-stage" id="stage-tac">
                <div class="stage-header">
                    <h3 class="stage-title">
                        <span class="stage-icon">🔁</span>
                        三地址码 TAC
                    </h3>
                    <div class="stage-status" id="status-tac"></div>
                </div>
                <div class="stage-content" id="content-tac">
                    <div class="empty-state">
                        <div class="empty-state-icon">🧾</div>
                        <p>AST 降低后的 TAC 将显示在这里</p>
                    </div>
                </div>
            </div>

            <div class="pipeline-stage" id="stage-code">
                <div class="stage-header">
                    <h3 class="stage-title">
                        <span class="stage-icon">⚙️</span>
                        代码生成
                    </h3>
                    <div class="stage-status" id="status-code"></div>
                </div>
                <div class="stage-content" id="content-code">
                    <div class="empty-state">
                        <div class="empty-state-icon">💾</div>
                        <p>生成的汇编代码</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/clike/clike.min.js"></script>
<script src="{{ url_for("static", filename="js/main.js") }}"></script>

</body>
</html>
